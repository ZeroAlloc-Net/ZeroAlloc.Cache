name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release -p:Version=${{ steps.version.outputs.version }} --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack ZeroAlloc.Cache
        run: >
          dotnet pack src/ZeroAlloc.Cache/ZeroAlloc.Cache.csproj
          -c Release -p:Version=${{ steps.version.outputs.version }}
          --no-build -o ./artifacts

      - name: Pack ZeroAlloc.Cache.Generator
        run: >
          dotnet pack src/ZeroAlloc.Cache.Generator/ZeroAlloc.Cache.Generator.csproj
          -c Release -p:Version=${{ steps.version.outputs.version }}
          --no-build -o ./artifacts

      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ secrets.NUGET_API_KEY }}
